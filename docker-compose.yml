version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: retail_weather_db
    environment:
      POSTGRES_DB: retail_weather
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: